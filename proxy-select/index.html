<!DOCTYPE html>
<html lang="en">
<head>
    <style>
:root {
    --bg-inner: #111111;
    --bg-outer: #020202;
    --neon-cyan: #00fff2;
    --neon-magenta: #ff00ff;
    --text-glow: rgba(255, 255, 255, 0.8);
}

body {
    background: radial-gradient(circle at center, var(--bg-inner), var(--bg-outer));
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

h1 {
    color: #fff;
    text-transform: uppercase;
    font-size: clamp(2rem, 5vw, 3.5rem); 
    margin-bottom: 50px;
    letter-spacing: 0.15em;
    text-align: center;
    text-shadow: 0 0 5px #fff, 
                 0 0 15px var(--text-glow), 
                 0 0 30px var(--text-glow);
}

.menu-container {
    display: flex;
    gap: 40px;
    flex-wrap: wrap; 
    justify-content: center;
}

.neon-btn {
    position: relative;
    font-size: 1.2rem;
    text-transform: uppercase;
    text-decoration: none;
    padding: 15px 35px;
    border: 2px solid; 
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 2px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    background: transparent;
    outline: none;
}

.neon-btn:active {
    transform: scale(0.95); 
}


.option-a {
    color: var(--neon-cyan);
    border-color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    box-shadow: inset 0 0 12px rgba(0, 255, 242, 0.4), 
                0 0 15px rgba(0, 255, 242, 0.4);
}

.option-a:hover {
    background: var(--neon-cyan);
    color: var(--bg-outer);
    text-shadow: none; 
    box-shadow: 0 0 20px var(--neon-cyan), 
                0 0 40px var(--neon-cyan), 
                0 0 60px rgba(0, 255, 242, 0.6);
    transform: translateY(-3px);
}


.option-b {
    color: var(--neon-magenta);
    border-color: var(--neon-magenta);
    text-shadow: 0 0 8px var(--neon-magenta);
    box-shadow: inset 0 0 12px rgba(255, 0, 255, 0.4), 
                0 0 15px rgba(255, 0, 255, 0.4);
}

.option-b:hover {
    background: var(--neon-magenta);
    color: var(--bg-outer);
    text-shadow: none;
    box-shadow: 0 0 20px var(--neon-magenta), 
                0 0 40px var(--neon-magenta), 
                0 0 60px rgba(255, 0, 255, 0.6);
    transform: translateY(-3px);
}
    </style>
</head>
<body>

    <h1>Select Proxy</h1>
    <div class="menu-container">
        <a href="/active/" class="neon-btn option-a">UV Static 2.0<br><small>(Likely blocked)</small></a>
        <a href="/sail/" class="neon-btn option-b">Scarmjet<br><small>(Likely Unblocked)</small></a>
    </div>
<h1>Scarmjet is the best option</h1>
    <h1>UV Static is broken right now</h1>
<h1>BloxProxy 1.9.78</h1>
</body>
</html>
