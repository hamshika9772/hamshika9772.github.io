<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxProxy</title>

<script src="/sail/baremux/index.js"></script>
<script src="/sail/scram/scramjet.all.js"></script>
<script>
navigator.serviceWorker.register("/sail/sw.js")
</script>

<style>
body{margin:0;background:#07111f;color:#e8f1ff;font-family:Segoe UI;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{padding:10px;background:#0b1729;border-bottom:1px solid #21406d}
.tabs{display:flex;gap:6px;overflow:auto}
.tab{padding:8px 14px;background:#10233d;border-radius:10px;color:#8aa3c7;cursor:pointer}
.tab.active{background:#163055;color:#fff}
.bar-wrap{display:flex;gap:8px;margin-top:8px}
input{flex:1;background:#0b1729;border:1px solid #21406d;color:#fff;padding:8px;border-radius:8px}
button{background:#163055;border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
#bookmarks{display:flex;gap:6px;margin-top:8px;overflow:auto}
.bookmark{background:#10233d;padding:6px 10px;border-radius:999px;cursor:pointer}
iframe{position:absolute;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
#view{flex:1;position:relative}
.menu{position:absolute;right:10px;top:50px;background:#0b1729;border:1px solid #21406d;border-radius:10px;display:none}
.menu button{display:block;width:100%;text-align:left}
</style>
</head>

<body>

<div class="top">
  <div class="tabs" id="tabs"></div>

  <div class="bar-wrap">
    <button onclick="back()">←</button>
    <button onclick="forward()">→</button>
    <button onclick="refresh()">↻</button>
    <input id="bar" placeholder="Search or URL">
    <button onclick="go()">GO</button>
    <button onclick="toggleMenu()">⋯</button>
  </div>

  <div id="bookmarks"></div>
</div>

<div id="view"></div>

<div class="menu" id="menu">
  <button onclick="openPage('/proxy/history/')">History</button>
  <button onclick="openPage('/proxy/settings/')">Settings</button>
</div>



</body>
</html>
