  /* ==========================================================================
   1. CORE VARIABLES & BASE SETUP
   ========================================================================== */
:root {
  --accent: #7c5cff;         /* Electric Purple */
  --accent2: #2fdcff;        /* Cyber Cyan */
  --text: #cfd6ff;           /* Light Ice Blue */

}

* {

  margin: 0;
  padding: 0;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0b0f2a, var(--bg-dark));
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* ==========================================================================
   2. INITIALIZATION SCREENS & MODALS (startupContent)
   ========================================================================== */
#loader {
  position: fixed;
  inset: 0;
  background: #05060d;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loader-content {
  text-align: center;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(124, 92, 255, 0.1);
  border-radius: 50%;
  border-top-color: var(--accent2);
  animation: spin 1s linear infinite;
  margin: 20px auto;
  box-shadow: var(--glow-cyan);
}

#hint {
  font-size: 14px;
  color: var(--accent2);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Modal Core Overlays */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(4, 5, 10, 0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-card {
  background: var(--bg-panel);
  border: 1px solid rgba(124, 92, 255, 0.2);
  border-radius: 12px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--glow-purple), inset 0 0 20px rgba(124, 92, 255, 0.1);
  display: none; /* Controlled via operational JS engine */
  flex-direction: column;
  gap: 16px;
}

/* Show states triggered via JS engine */
.modal-card.active {
  display: flex;
}

.modal-title {
  font-size: 24px;
  color: #fff;
  text-shadow: var(--text-glow-cyan);
}

.modal-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}

.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 8px 0;
}

.pagination .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  transition: 0.2s;
}

.pagination .dot.active {
  background: var(--accent2);
  box-shadow: var(--glow-cyan);
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 12px;
}

/* Buttons Engine */
.btn-primary, .btn-secondary {
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary {
  background: var(--accent);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  box-shadow: 0 4px 12px rgba(124, 92, 255, 0.3);
}

.btn-primary:hover {
  background: #8b6eff;
  box-shadow: var(--glow-purple);
}

.btn-secondary {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-muted);
}

.btn-secondary:hover {
  color: #fff;
  border-color: rgba(255, 255, 255, 0.3);

/* ==========================================================================
   3. APP VIEWPORT ENVIRONMENT LAYOUT (appContent)
   ========================================================================== */

/* Sidebar Navigation Drawer Frame */

  border-right: 1px solid rgba(255, 255, 255, 0.04);
  display: flex;
  flex-direction: column;

  z-index: 10;
