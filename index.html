/* ==========================================================================
   1. CORE DESIGN TOKENS & RESET
   ========================================================================== */
:root {
  --accent: #7c5cff;         /* Electric Neon Purple */
  --accent2: #2fdcff;        /* Cyber Glow Cyan */
  --text: #cfd6ff;           /* Muted Ice Blue */
  --text-muted: #5d6793;     /* Cold Slate Gray */

  --text-glow-cyan: 0 0 10px rgba(47, 220, 255, 0.6);

}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0b0f2a, var(--bg-dark));
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: var(--text);
  overflow: hidden;
  line-height: 1.5;
}

/* Global SVG Rule: Enforces all SVGs to be white */
svg {
  fill: #ffffff !important;
  transition: filter 0.2s ease;
}
svg[stroke] {
  stroke: #ffffff !important;
}

/* Custom Cyberpunk Scrollbars */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: rgba(5, 6, 13, 0.5);
}
::-webkit-scrollbar-thumb {
  background: rgba(124, 92, 255, 0.2);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
  box-shadow: var(--glow-purple);
}

/* ==========================================================================
   2. INITIALIZATION LOADER & WELCOME FLOW (startupContent)
   ========================================================================== */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg-dark);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

  height: auto;
  filter: drop-shadow(0 0 15px rgba(124, 92, 255, 0.4));

  border-top-color: var(--accent2);

  margin: 16px auto;
  box-shadow: var(--glow-cyan);

  color: var(--accent2);
  letter-spacing: 2.5px;
  text-transform: uppercase;

/* Modal Core Overlays */
