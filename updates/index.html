  margin: 0.5rem 0;

.bloxy-btn::before {
  content: '';

  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;

  z-index: 1;

  transform: translateY(-2px);
  box-shadow: var(--glow-purple), 0 10px 25px rgba(0, 0, 0, 0.5);
