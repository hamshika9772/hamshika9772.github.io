name: Fork Sync (Marketplace)

on:
  schedule:
    # Daily check at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Run official forks sync action
        uses: TobKed/github-forks-sync-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repository: tharun9772/Bloxcraft-UBG
          target_repository: Real-Nightmare/Bloxcraft-UBG
          upstream_branch: main
          target_branch: main
          force: true
          tags: true
