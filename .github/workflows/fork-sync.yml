name: Fork Sync

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new commits from upstream
        id: check
        run: |
          git remote add upstream https://github.com/tharun9772/Bloxcraft-UBG.git || git remote set-url upstream https://github.com/tharun9772/Bloxcraft-UBG.git
          git fetch upstream main
          
          LOCAL=$(git rev-parse origin/main)
          REMOTE=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "new_commits=true" >> $GITHUB_OUTPUT
            echo "New commits found from upstream!"
          else
            echo "new_commits=false" >> $GITHUB_OUTPUT
            echo "Fork is already up to date."
          fi

      - name: Sync fork with upstream
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git reset --hard upstream/main
          git push origin main --force
          
          echo "✓ Fork synced successfully with upstream repository"
          git log -1 --oneline
