name: Fork Sync

on:
  schedule:
    # every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN || github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/tharun9772/Bloxcraft-UBG.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork is already up to date"
          else
            git merge upstream/main -m "Sync from upstream tharun9772/Bloxcraft-UBG"
          fi

      - name: Push changes
        run: git push origin main
        continue-on-error: true
