name: Fork Sync

on:
  schedule:
    # every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Sync fork with upstream using tgymnich/fork-sync
        uses: tgymnich/fork-sync@v2.0
        with:
          # Token to access the GitHub API.
          # Prefer a PAT stored as `GH_PERSONAL_ACCESS_TOKEN` for cross-repo PRs; fall back to the repo token.
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN || github.token }}
          owner: tharun9772
          repo: Bloxcraft-UBG
          head: main
          base: main
          merge_method: merge
          pr_title: Fork Sync
          pr_message: Sync from upstream tharun9772/Bloxcraft-UBG
          auto_approve: false
          ignore_fail: false
