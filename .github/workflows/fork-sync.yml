name: Fork Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for upstream updates
        id: check
        run: |
          git remote add upstream https://github.com/tharun9772/Bloxcraft-UBG.git || git remote set-url upstream https://github.com/tharun9772/Bloxcraft-UBG.git
          git fetch upstream main
          
          LOCAL=$(git rev-parse origin/main)
          REMOTE=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync fork with upstream
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git reset --hard upstream/main
          git push origin main --force
          
          echo "✓ Fork successfully synced with upstream Bloxcraft-UBG"
