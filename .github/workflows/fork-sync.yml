name: Fork Sync

on:
  schedule:
    # Runs at 00:00 UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork with upstream
        run: |
          # Add upstream remote
          git remote add upstream https://github.com/tharun9772/Bloxcraft-UBG.git || git remote set-url upstream https://github.com/tharun9772/Bloxcraft-UBG.git
          
          # Fetch upstream commits
          git fetch upstream
          
          # Reset local branch to upstream/main
          git reset --hard upstream/main
          
          # Force push to origin
          git push origin main --force

      - name: Display sync status
        run: |
          echo "✓ Fork synced successfully with upstream repository"
          git log -1 --oneline
