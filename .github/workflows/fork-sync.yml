name: Fork Sync

on:
  schedule:
    # Daily check for upstream updates at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream repository
        run: |
          git remote add upstream https://github.com/tharun9772/Bloxcraft-UBG.git || git remote set-url upstream https://github.com/tharun9772/Bloxcraft-UBG.git
          git fetch upstream main

      - name: Check for new commits
        id: check_updates
        run: |
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)

          echo "Local commit: $LOCAL"
          echo "Upstream commit: $REMOTE"

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync fork with upstream
        if: steps.check_updates.outputs.updates_available == 'true'
        run: |
          git reset --hard upstream/main
          git push origin main --force
          echo "✓ Fork synced successfully with upstream Bloxcraft-UBG"
          git log -1 --oneline

