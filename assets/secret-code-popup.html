    <style>
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(3, 4, 9, 0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.popup {
  background: linear-gradient(150deg, rgba(13, 16, 37, 0.95) 0%, rgba(5, 6, 13, 0.98) 100%);
  border: 1px solid rgba(124, 92, 255, 0.3);
  border-top: 3px solid var(--accent2);
  border-radius: 16px;
  padding: 32px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(124, 92, 255, 0.15);
  position: relative;
}

.popup h2 {
  margin-top: 0;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
}

.popup input {
  width: 80%;
  padding: 12px;
  background: rgba(18, 19, 24, 0.8);
  border: 1px solid rgba(124, 92, 255, 0.2);
  border-radius: 8px;
  margin: 10px 0;
  font-size: 14px;
  color: #fff;
  font-family: inherit;
  transition: all 0.2s ease;
}

.popup input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: var(--glow-purple);
}

.popup button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 15px rgba(124, 92, 255, 0.2);
  transition: all 0.2s ease;
}

.popup button:hover {
  background: #8b6eff;
  box-shadow: var(--glow-purple);
  transform: translateY(-1px);
}

.popup .close {
  position: absolute;
  top: 14px;
  right: 16px;
  background: transparent;
  border: none;
  color: #5d6793;
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s ease;
}

.popup .close:hover {
  color: #fff;
}

:root {
  --accent: #7c5cff;
  --accent2: #441af0;
  --accent3: #2fdcff;
  --text: #cfd6ff;
  --text-muted: #5d6793;
  --bg-dark: #05060d;
  --glow-purple: 0 0 15px rgba(124, 92, 255, 0.5);
  --glow-cyan: 0 0 15px rgba(0, 102, 255, 0.5);
  --text-glow-cyan: 0 0 10px rgba(47, 220, 255, 0.6);
  --text-glow-purple: 0 0 10px rgba(124, 92, 255, 0.6);
}

.message {
  margin-top: 8px;
  color: #ff6b6b;
  font-weight: 600;
  font-size: 13px;
  text-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0b0f2a, var(--bg-dark));
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: var(--text);
  line-height: 1.5;
}

.app {
  display: flex;
  height: 100%;
}

.sidebar {
  width: 64px;
  background: rgba(4, 5, 11, 0.98);
  border-right: 1px solid rgba(124, 92, 255, 0.1);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 16px 0;
}

.nav-group, .extra-nav-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.nav-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-btn svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
  opacity: 0.75;
}

.nav-btn:hover {
  transform: translateY(-2px);
  background: rgba(124, 92, 255, 0.1);
  border-color: rgba(124, 92, 255, 0.2);
  color: #fff;
  box-shadow: var(--glow-purple);
}

.nav-btn:hover svg {
  opacity: 1;
  filter: drop-shadow(0 0 4px #fff);
}

.main {
  flex: 1;
  position: relative;
}

.home {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.logo {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 1px solid rgba(124, 92, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13, 16, 37, 0.5);
  box-shadow: 0 0 25px rgba(124, 92, 255, 0.4), inset 0 0 15px rgba(47, 220, 255, 0.1);
  margin-bottom: 22px;
  transition: all 0.3s ease;
}

.logo:hover {
  transform: scale(1.03);
  border-color: rgba(124, 92, 255, 0.6);
  box-shadow: 0 0 35px rgba(124, 92, 255, 0.7);
}

.logo img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  filter: drop-shadow(0 0 15px rgba(47, 220, 255, 0.6));
}

.title {
  font-size: 44px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #fff;
  text-shadow: var(--text-glow-purple);
}

.subtitle {
  margin-top: 12px;
  color: var(--text);
  font-size: 14px;
  max-width: 600px;
  opacity: 0.85;
}

iframe, #htmlContainer {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: transparent;
}

#htmlContainer {
  overflow: auto;
}

#extraOverlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(6, 7, 10, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
  color: var(--text);
  flex-direction: column;
  padding: 32px 24px;
  overflow: auto;
}

#extraOverlay h2 {
  color: #fff;
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 24px;
  text-shadow: var(--text-glow-purple);
}

#extraOverlay .extraItem {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(18, 19, 24, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 10px;
  padding: 14px 16px;
  color: #fff;
}

#extraOverlay button {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
}

#extraOverlay button:hover {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.2);
}

.extraIconPreview {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
