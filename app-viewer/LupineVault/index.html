<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloxcraft UBG - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="shortcut icon" type="image/png" href="/bloxcraft.png">
  <link rel="stylesheet" href="/app-viewer/app-viewer-default.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W0KXN0103E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W0KXN0103E');
  </script>

  <script>
  (function(w,d,s,l,i){
    w[l]=w[l]||[];
    w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
    var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),
    dl=l!='dataLayer'?'&l='+l:'';
    j.async=true;
    j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
    f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-NQM8XR48');
  </script>
</head>

<body>
  <div id="viewerBar">
    <p id="viewerTitle">Opening...</p>
    <div id="Btn-Group">
      <a class="bloxy-blue-btn bloxy-btn" href="/games">Close</a>
      <a class="bloxy-blue-btn bloxy-btn" id="closeViewer" href="https://google.com/">Google</a>
      <a class="bloxy-blue-btn bloxy-btn" id="openNewTab">Play In New Tab</a>
    </div>
  </div>

  <iframe id="viewerFrame"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gameName = params.get("view");
    const viewerFrame = document.getElementById("viewerFrame");
    const viewerTitle = document.getElementById("viewerTitle");
    const closeViewer = document.getElementById("closeViewer");
    const openNewTab = document.getElementById("openNewTab");

    if (gameName) {
      const encodedName = encodeURIComponent(gameName);
      const apiUrl = `https://gitlab.com/api/v4/projects/rhenryw%2FLupineVault/repository/files/games%2Ffiles%2F${encodedName}%2Findex.html/raw?ref=main`;
      const directUrl = `https://gitlab.com/rhenryw/LupineVault/-/raw/main/games/files/${encodedName}/index.html`;

      viewerTitle.textContent = gameName;

      (async () => {
        try {
          const r = await fetch(apiUrl);
          if (!r.ok) throw new Error(r.status);
          let htmlText = await r.text();
          
          const baseTag = `<base href="https://gitlab.com/api/v4/projects/rhenryw%2FLupineVault/repository/files/games%2Ffiles%2F${encodedName}/">`;
          
          if (htmlText.includes("<head>")) {
            htmlText = htmlText.replace("<head>", `<head>\n  ${baseTag}`);
          } else {
            htmlText = baseTag + htmlText;
          }

          viewerFrame.srcdoc = htmlText;
        } catch (e) {
          console.error(e);
          viewerTitle.textContent = "Error loading game";
        }
      })();

      viewerFrame.addEventListener("load", () => {
        try {
          const iframeDoc = viewerFrame.contentDocument || viewerFrame.contentWindow.document;
          const iframeTitle = iframeDoc.querySelector("title")?.innerText;
          if (iframeTitle) viewerTitle.textContent = iframeTitle;
        } catch (e) {}
      });

      openNewTab.addEventListener("click", (e) => {
        e.preventDefault();
        window.open(directUrl, "_blank", "noopener,noreferrer");
      });
    } else {
      viewerTitle.textContent = " ";
    }

    closeViewer.addEventListener("click", () => {
      window.top.location.href = "https://google.com/";
    });
  </script>
  <script src="/main-injection.js"></script>
</body>
</html>
