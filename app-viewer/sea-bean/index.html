<body>
  <div id="viewerBar">
    <p id="viewerTitle">Loading...</p>
    <div id="Btn-Group">
      <a class="bloxy-blue-btn bloxy-btn" href="/games">Close</a>
      <a class="bloxy-blue-btn bloxy-btn" id="closeViewer" href="https://google.com/">Google</a>
      <a class="bloxy-blue-btn bloxy-btn" id="openNewTab">Play In New Tab</a>
    </div>
  </div>

  <iframe id="viewerFrame"></iframe>


<script>
const params = new URLSearchParams(window.location.search);
const viewId = params.get("view"); // ✅ FIXED

const viewerFrame = document.getElementById("viewerFrame");
const viewerTitle = document.getElementById("viewerTitle");
const closeViewer = document.getElementById("closeViewer");
const openNewTab = document.getElementById("openNewTab");

const jsonUrl = "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/sde@main/zzz.json";

function show404() {
  viewerFrame.srcdoc = `
    <style>
      body{
        background:black;
        color:white;
        font-family:sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-size:24px;
        margin:0;
      }
    </style>
    404 Blocked Or Not Found
  `;
  viewerTitle.textContent = "";
}

if (!viewId) {
  show404();
} else {
  viewerTitle.textContent = "Loading...";

  fetch(jsonUrl)
    .then(res => res.json())
    .then(data => {

      const entry = data.find(e => String(e.id) === String(viewId));

      if (!entry) throw new Error("Game not found");

      viewerTitle.textContent = entry.name || viewId;

      // resolve HTML
      let htmlUrl = entry.html || entry.url || "";

      if (htmlUrl.includes("{HTML_URL}")) {
        htmlUrl = htmlUrl.replace(
          "{HTML_URL}",
          "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Singlemile@main/games/"
        );
      }

      fetch(htmlUrl)
        .then(res => {
          if (!res.ok) throw new Error();
          return res.text();
        })
        .then(html => {
          viewerFrame.srcdoc = html;
        })
        .catch(show404);

      openNewTab.onclick = async (e) => {
        e.preventDefault();

        try {
          const res = await fetch(htmlUrl);
          if (!res.ok) throw new Error();
          const html = await res.text();

          const newTab = window.open("about:blank", "_blank");
          if (!newTab) return alert("Popup blocked");

          newTab.document.open();
          newTab.document.write(html);
          newTab.document.close();
        } catch {
          alert("Failed to open game");
        }
      };

    })
    .catch(show404);
}

closeViewer.addEventListener("click", () => {
  window.location.href = "/games";
});
</script>
  
  <script src="/main-injection.js"></script>
