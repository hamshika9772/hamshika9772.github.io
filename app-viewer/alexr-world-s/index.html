<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="favicon" rel="shortcut icon" type="image/png" href="/bloxcraft.png">
<link rel="stylesheet" href="/app-viewer/app-viewer-default.css">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-W0KXN0103E"></script>

  w[l]=w[l]||[];
  w[l].push({
    'gtm.start': new Date().getTime(),
    event:'gtm.js'

  var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),
      dl=l!='dataLayer'?'&l='+l:'';

</head>

<body>

<div id="viewerBar">
  <p id="viewerTitle">Loading...</p>

  <div id="Btn-Group">
    <a class="bloxy-blue-btn bloxy-btn" href="/games">Close</a>
    <a class="bloxy-blue-btn bloxy-btn" id="closeViewer">Google</a>
    <a class="bloxy-blue-btn bloxy-btn" id="openNewTab">Play In New Tab</a>
  </div>
</div>

<iframe id="viewerFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);

const view = params.get("view");

const JSON_URL = "https://cdn.jsdelivr.net/gh/dskjfoisjfsjio/alexrsworld@latest/singlefilegames.json";

const viewerFrame = document.getElementById("viewerFrame");
const viewerTitle = document.getElementById("viewerTitle");
const openNewTab = document.getElementById("openNewTab");

function show404(){
  viewerFrame.srcdoc = `
    <div style="
      background:black;
      color:white;
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:sans-serif;
      font-size:40px;
    ">
      404
    </div>
  `;
}

async function loadGame(){

  if(!view){
    show404();
    return;
  }

  try{

    const games = await fetch(JSON_URL).then(r => r.json());

    const game = games.find(g =>
      g.title.toLowerCase() === decodeURIComponent(view).toLowerCase()
    );

    if(!game){
      throw new Error("Game not found");
    }

    viewerTitle.textContent = game.title;

    const html = await fetch(game.path).then(r => r.text());

    const blob = new Blob([html], {
      type: "text/html"
    });

    const blobUrl = URL.createObjectURL(blob);

    viewerFrame.src = blobUrl;

    openNewTab.onclick = async () => {
      const tab = window.open("about:blank");

      tab.document.open();
      tab.document.write(html);
      tab.document.close();
    };

  } catch(err){
    console.error(err);
    show404();
  }
}

loadGame();

document.getElementById("closeViewer").onclick = () => {
  window.top.location.href = "https://google.com/";
};
</script>

</body>
</html>
