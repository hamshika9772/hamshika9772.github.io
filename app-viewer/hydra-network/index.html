<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloxcraft UBG - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="shortcut icon" type="image/png" href="/bloxcraft.png">
  <link rel="stylesheet" href="/app-viewer/app-viewer-default.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W0KXN0103E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W0KXN0103E');
  </script>

  <script>
    (function(w,d,s,l,i){
      w[l]=w[l]||[];
      w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
      var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),
          dl=l!='dataLayer'?'&l='+l:'';
      j.async=true;
      j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
      f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NQM8XR48');
  </script>
</head>

<body>
<div id="viewerBar">
  <p id="viewerTitle">Loading...</p>
  <div id="Btn-Group">
    <a class="bloxy-blue-btn bloxy-btn" href="/games">Close</a>
    <a class="bloxy-blue-btn bloxy-btn" id="closeViewer">Google</a>
    <a class="bloxy-blue-btn bloxy-btn" id="openNewTab">Play In New Tab</a>
  </div>
</div>

<iframe id="viewerFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const view = params.get("view");

const BASE = "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/gmes/";
const JSON_URL = "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/gmes.json";

const viewerFrame = document.getElementById("viewerFrame");
const viewerTitle = document.getElementById("viewerTitle");
const openNewTab = document.getElementById("openNewTab");

function show404(){
  viewerFrame.srcdoc = "<h1 style='color:white;background:black;height:100vh;display:flex;align-items:center;justify-content:center;'>404</h1>";
}

if(!view){
  show404();
} else {

  fetch(JSON_URL)
    .then(r=>r.json())
    .then(data=>{
      const game = data.find(g => g.file_name === view);
      if(!game) throw new Error();

      const fullUrl = BASE + game.file_name;
      viewerTitle.textContent = game.title;

      fetch(fullUrl)
        .then(r=>r.text())
        .then(html=>{
          viewerFrame.srcdoc = html;
        });

      openNewTab.onclick = async () => {
        const html = await fetch(fullUrl).then(r=>r.text());
        const tab = window.open("about:blank");
        tab.document.write(html);
      };

    })
    .catch(show404);
}

document.getElementById("closeViewer").onclick = ()=>{
  window.top.location.href = "https://google.com/";
};
</script>
</body>
</html>
