<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloxcraft UBG - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="shortcut icon" type="image/png" href="/bloxcraft.png">

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: sans-serif;
    }

    #viewerBar {
      height: 50px;
      background: #1b1b1b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      position: relative;
      z-index: 10;
    }

    #viewerFrame {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      display: block;
    }

    .bloxy-blue-btn {
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      background: #3b82f6;
      border-radius: 6px;
      margin-left: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div id="viewerBar">
    <p id="viewerTitle">Loading...</p>

    <div id="Btn-Group">
      <a class="bloxy-blue-btn" href="/games">Close</a>
      <a class="bloxy-blue-btn" id="closeViewer" href="https://google.com/">Google</a>
      <a class="bloxy-blue-btn" id="openNewTab">New Tab</a>
    </div>
  </div>

  
  <iframe id="viewerFrame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>

<script>
const params = new URLSearchParams(location.search);
const view = params.get("view");

const viewerFrame = document.getElementById("viewerFrame");
const viewerTitle = document.getElementById("viewerTitle");

const BASE = "https://cdn.jsdelivr.net/gh/bloxcraft-st/google-class-files@main/";

let gameData = null;
let finalUrl = null;

async function loadGame(){

  if(!view){
    viewerTitle.textContent = "No game selected";
    return;
  }

  try{
    const res = await fetch(BASE + "assets/games.json");
    const data = await res.json();

    gameData = data.find(g => g.url === view);

    if(!gameData){
      viewerTitle.textContent = "Game not found";
      return;
    }

    finalUrl = BASE + gameData.url;

    viewerTitle.textContent = gameData.name;

    const html = await fetch(finalUrl).then(r => r.text());

    injectIntoFrame(html);

  } catch(err){
    console.error(err);
    viewerTitle.textContent = "Failed to load";
  }
}

function injectIntoFrame(html){

  const doc = `
  <!DOCTYPE html>
  <html>
    <head>
      <base href="${BASE}">
      <style>
        html,body {
          margin:0;
          padding:0;
          width:100%;
          height:100%;
          overflow:hidden;
          background:black;
        }
      </style>
    </head>
    <body>
      ${html}
    </body>
  </html>
  `;

  viewerFrame.srcdoc = doc;
}


document.getElementById("openNewTab").onclick = () => {
  if(!finalUrl) return;

  window.open(finalUrl, "_blank");
};


document.getElementById("closeViewer").onclick = () => {
  location.href = "https://google.com/";
};

loadGame();
</script>

</body>
</html>
