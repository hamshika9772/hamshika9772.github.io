<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloxcraft UBG - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="shortcut icon" type="image/png" href="/bloxcraft.png">
  <link rel="stylesheet" href="/app-viewer/app-viewer-default.css">
</head>

<body>
  <div id="viewerBar">
    <p id="viewerTitle">Loading...</p>
    <div id="Btn-Group">
      <a class="bloxy-blue-btn bloxy-btn" href="/games">Close</a>
      <a class="bloxy-blue-btn bloxy-btn" id="closeViewer" href="https://google.com/">Google</a>
      <a class="bloxy-blue-btn bloxy-btn" id="openNewTab">Play In New Tab</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const view = params.get("view");

    const viewerTitle = document.getElementById("viewerTitle");

    const BASE = "https://cdn.jsdelivr.net/gh/bloxcraft-st/google-class-files@main/";

    let gameData = null;
    let finalUrl = null;
    let aboutWindow = null;

    async function loadGame(){
      if(!view){
        viewerTitle.textContent = "No game selected";
        return;
      }

      try{
        const res = await fetch(BASE + "assets/games.json");
        const data = await res.json();

        gameData = data.find(g => g.url === view);

        if(!gameData){
          viewerTitle.textContent = "Game not found";
          return;
        }

        finalUrl = BASE + gameData.url;

        viewerTitle.textContent = gameData.name || "Untitled Game";

        openAboutBlank();

      } catch(err){
        console.error(err);
        viewerTitle.textContent = "Failed to load game";
      }
    }

    function openAboutBlank(){
      if(!finalUrl) return;

 
      aboutWindow = window.open("about:blank", "_blank");

      if(!aboutWindow){
        alert("Popup blocked. Please allow popups.");
        return;
      }

      fetch(finalUrl)
        .then(res => res.text())
        .then(html => {

          aboutWindow.document.open();
          aboutWindow.document.write(html);
          aboutWindow.document.close();

        })
        .catch(err => {
          console.error(err);
          aboutWindow.document.write("<h1>Failed to load game</h1>");
        });
    }

  
    document.getElementById("openNewTab").addEventListener("click", (e) => {
      e.preventDefault();

      if(finalUrl){
        const w = window.open("about:blank", "_blank");

        fetch(finalUrl)
          .then(res => res.text())
          .then(html => {
            w.document.open();
            w.document.write(html);
            w.document.close();
          });
      }
    });

  
    document.getElementById("closeViewer").addEventListener("click", () => {
      window.top.location.href = "https://google.com/";
    });

    loadGame();
  </script>
</body>
</html>
